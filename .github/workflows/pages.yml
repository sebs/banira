name: Pages

# Generate the TypeDoc API docs and deploy them to GitHub Pages.
# Docs are never committed: they are built fresh from source on every push to
# main and published as a Pages artifact.
#
# One-time setup on GitHub: repo -> Settings -> Pages -> Build and deployment
# -> Source: "GitHub Actions".
on:
  push:
    branches:
      - main
  workflow_dispatch:

# Least-privilege token needed to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Generate docs
        run: npm run docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
