name: Pages

# Build the banira website and deploy it to GitHub Pages.
# The site is generated from site/ by a zero-dependency Node script (landing,
# docs guides, CLI reference, playground); the TypeDoc API reference is generated
# fresh from source and mounted under /api/. Nothing is committed: the whole site
# is assembled in the pipeline and published as a Pages artifact.
#
# One-time setup on GitHub: repo -> Settings -> Pages -> Build and deployment
# -> Source: "GitHub Actions".
on:
  push:
    branches:
      - main
  workflow_dispatch:

# Least-privilege token needed to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build site
        run: node site/build.mjs

      - name: Generate API docs
        run: npm run docs

      - name: Mount API reference under /api/
        run: |
          mkdir -p _site/api
          cp -r docs/. _site/api/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
